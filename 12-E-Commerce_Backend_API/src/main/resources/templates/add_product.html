<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Add Product</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
</head>
<body>
<div class="container mt-5">
  <h2>Add New Product</h2>
  <form th:action="@{/products/save}" method="post" th:object="${product}" class="mt-4">
    <div class="mb-3">
      <label class="form-label">Product Name</label>
      <input type="text" class="form-control" th:field="*{name}" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Price</label>
      <input type="number" step="0.01" class="form-control" th:field="*{price}" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Stock</label>
      <input type="number" class="form-control" th:field="*{stock}" required>
    </div>
    <button type="submit" class="btn btn-primary">Save Product</button>
    <a href="/products" class="btn btn-secondary ms-2">Back</a>
  </form>
</div>
</body>
</html>
