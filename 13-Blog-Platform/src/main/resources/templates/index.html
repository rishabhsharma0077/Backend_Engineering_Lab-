<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Blog Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .card {
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            border-radius: 15px;
        }
        .form-control, .form-select {
            border-radius: 10px;
        }
        .btn {
            border-radius: 10px;
        }
        .blog-title {
            font-size: 2.5rem;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="container py-5">
    <h1 class="text-center blog-title mb-4">📝 Blog Posts</h1>

    <!-- Search -->
    <form class="input-group mb-4" th:action="@{/search}" method="get">
        <input type="text" name="keyword" class="form-control" placeholder="Search title..." />
        <button class="btn btn-primary" type="submit">Search</button>
    </form>

    <!-- Add New Post -->
    <div class="card mb-5">
        <div class="card-header bg-dark text-white">
            Add New Post
        </div>
        <div class="card-body">
            <form th:action="@{/add}" method="post">
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <input type="text" name="title" placeholder="Title" class="form-control" required />
                    </div>
                    <div class="col-md-6">
                        <input type="text" name="author" placeholder="Author" class="form-control" required />
                    </div>
                    <div class="col-md-6">
                        <input type="date" name="date" class="form-control" required />
                    </div>
                    <div class="col-md-6">
                        <input type="text" name="category" placeholder="Category" class="form-control" required />
                    </div>
                    <div class="col-12">
                        <textarea name="content" placeholder="Content" rows="4" class="form-control" required></textarea>
                    </div>
                </div>
                <button type="submit" class="btn btn-success">➕ Add Post</button>
            </form>
        </div>
    </div>

    <!-- Blog Post Cards -->
    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
        <div class="col" th:each="post : ${posts}">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title" th:text="${post.title}">Post Title</h5>
                    <p class="card-text" th:text="${post.content}">Post content preview...</p>
                </div>
                <div class="card-footer text-muted">
                    <small>
                        <span th:text="'Author: ' + ${post.author}">Author</span> |
                        <span th:text="${post.date}">Date</span> |
                        <span th:text="'Category: ' + ${post.category}">Category</span>
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS (optional) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
